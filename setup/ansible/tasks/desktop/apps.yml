- name: Install nice-to-have packages via pacman
  become: true
  community.general.pacman:
    name:
      - gimp
      - baobab
      - qt5-base
      - qt6-base
      - obs-studio
      - pdftk
      - xournalpp
      - okular
      - krita
      - vlc
      - vlc-plugins-all
      - drawio-desktop
      - flameshot
      - exfatprogs
      - appstream-glib # mission-center dependency
      - obs-studio
      - thunderbird
      - discord
      - remmina # remote desktop client
      - firefox
    state: present
- name: Install nice-to-have packages via AUR
  ansible.builtin.include_role:
    name: aur_build
  vars:
    aur_packages:
      - google-chrome
      - postman-bin
      - pdfarranger
      - amberol
      - anki
      - mission-center
      - pinta
      - python-pympress
      - qutebrowser
      - lmstudio-beta
      - gpu-screen-recorder # ShadowPlay alternative
      - teams-for-linux
      - libtiff5 # wps dependency
      - wps-office # Office tools
      - nextcloud-client
- name: Install Python tools via pipx
  ansible.builtin.include_role:
    name: pipx_install
  vars:
    package_name: "{{ item }}"
  loop:
    - screenpen
- name: Create Discord update systemd service # TODO: also need to update database
  become: true
  copy:
    dest: /etc/systemd/system/update-discord.service
    owner: root
    group: root
    mode: '0644'
    content: |
      [Unit]
      Description=Update Discord package after boot
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      ExecStart=/bin/bash -c 'sleep 10 && /usr/bin/pacman -S discord --needed --noconfirm'

      [Install]
      WantedBy=multi-user.target
- name: Enable discord update service
  become: true
  ansible.builtin.systemd:
    name: update-discord.service
    enabled: true
  when: ansible_facts['virtualization_type'] != "docker"
- name: Install and initialize Waydroid
  become: true
  block:
    - name: Install Waydroid packages
      pacman:
        name:
          - waydroid
          - lxc
          - dnsmasq
        state: present
        update_cache: true
    - name: Enable and start Waydroid container service
      when: ansible_facts['virtualization_type'] != "docker"
      systemd:
        name: waydroid-container.service
        enabled: true
        state: started
    - name: Initialize Waydroid (run once)
      when: ansible_facts['virtualization_type'] != "docker"
      command: waydroid init
      args:
        creates: /var/lib/waydroid
- name: Install dbcUtility
  block:
    - name: Create dbcUtility build directory
      ansible.builtin.file:
        path: "{{ playbook_dir | dirname }}/build/dbcUtility"
        state: directory
        mode: "0755"
    - name: Clone dbcUtility
      ansible.builtin.git:
        repo: https://github.com/busaudit/dbcUtility.git
        dest: "{{ playbook_dir | dirname }}/build/dbcUtility"
        version: master
        depth: 1
        force: true
    - name: Build dbcUtility
      become: true
      ansible.builtin.command:
        cmd: uv run python scripts/build_linux.py
        chdir: "{{ playbook_dir | dirname }}/build/dbcUtility"
      when: not ansible_check_mode
    - name: Install dbcUtility without install.sh
      when: not ansible_check_mode
      block:
        - name: Set paths
          ansible.builtin.set_fact:
            dbc_src_dir: "{{ playbook_dir | dirname }}/build/dbcUtility/linuxBuilds/DBCUtility-Linux-x86_64"
            dbc_install_dir: /opt/DBCUtility
            dbc_user_home: "{{ ansible_env.HOME }}"
            dbc_desktop_dir: "{{ ansible_env.HOME }}/.local/share/applications"
            dbc_icon_dir: "{{ ansible_env.HOME }}/.local/share/icons"
        - name: Create install directory
          become: true
          ansible.builtin.file:
            path: "{{ dbc_install_dir }}"
            state: directory
            mode: "0755"
        - name: Copy application files
          become: true
          ansible.builtin.copy:
            src: "{{ dbc_src_dir }}/"
            dest: "{{ dbc_install_dir }}/"
            remote_src: true
            mode: preserve
        - name: Ensure main executable permissions
          become: true
          ansible.builtin.file:
            path: "{{ item }}"
            mode: "0755"
          loop:
            - "{{ dbc_install_dir }}/DBCUtility"
            - "{{ dbc_install_dir }}/launch-dbc-utility.sh"
        - name: Create user desktop applications directory
          ansible.builtin.file:
            path: "{{ dbc_desktop_dir }}"
            state: directory
            mode: "0755"
        - name: Install desktop entry
          ansible.builtin.copy:
            src: "{{ dbc_install_dir }}/DBCUtility.desktop"
            dest: "{{ dbc_desktop_dir }}/DBCUtility.desktop"
            remote_src: true
            mode: "0644"
        - name: Update desktop entry Exec path
          ansible.builtin.replace:
            path: "{{ dbc_desktop_dir }}/DBCUtility.desktop"
            regexp: '^Exec=launch-dbc-utility\.sh$'
            replace: "Exec={{ dbc_install_dir }}/launch-dbc-utility.sh"
        - name: Update desktop entry Icon name
          ansible.builtin.replace:
            path: "{{ dbc_desktop_dir }}/DBCUtility.desktop"
            regexp: '^Icon=app_icon\.png$'
            replace: "Icon=dbc-utility"
        - name: Create user icon directory
          ansible.builtin.file:
            path: "{{ dbc_icon_dir }}"
            state: directory
            mode: "0755"
        - name: Install application icon
          ansible.builtin.copy:
            src: "{{ dbc_install_dir }}/_internal/icons/app_icon.png"
            dest: "{{ dbc_icon_dir }}/dbc-utility.png"
            remote_src: true
            mode: "0644"
        - name: Update desktop database
          ansible.builtin.command:
            cmd: update-desktop-database "{{ dbc_desktop_dir }}"
          changed_when: false
          failed_when: false
